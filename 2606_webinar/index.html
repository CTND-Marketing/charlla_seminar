<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웨비나 등록 | AI 시대, 영상형 스킨으로 웹 에이전시의 차별점 만드는 법</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --bg:#0a0b0d;
    --panel:#141518;
    --line-soft:#23262b;
    --text:#f3f4f6;
    --text-2:#aeb2ba;
    --text-3:#7e828b;
    --mint:#8fecc4;
    --mint-soft:#9fe8c8;
    --mint-deep:#54c79a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Pretendard','Pretendard Variable',-apple-system,system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    letter-spacing:-0.01em;
  }

  /* ===== Layout ===== */
  .shell{
    display:grid;
    grid-template-columns:minmax(0,1fr) 450px;
    max-width:1290px;
    margin:0 auto;
    align-items:start;
  }

  /* Left: image only */
  .detail{ min-width:0; background:#0a0b0d; }
  .detail img{
    display:block;
    width:100%;
    height:auto;
  }

  /* Right: sticky form */
  .form-col{
    position:sticky;
    top:0;
    border-left:1px solid var(--line-soft);
    background:linear-gradient(180deg,#0e0f12 0%, #0a0b0d 100%);
  }

  .form-inner{padding:40px 22px 56px 52px}
  .form-head{margin-bottom:26px}
  .form-kicker{font-size:13px;font-weight:700;color:var(--mint);letter-spacing:.04em;text-transform:uppercase;margin-bottom:10px}
  .form-head h2{font-size:24px;font-weight:800;letter-spacing:-0.02em;line-height:1.35}
  .form-meta{
    margin-top:18px;display:flex;flex-direction:column;gap:10px;
    padding:16px 18px;background:var(--panel);border:1px solid var(--line-soft);border-radius:14px;
  }
  .form-meta .item{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--text-2)}
  .form-meta .item svg{flex:0 0 16px;color:var(--mint-deep)}
  .form-meta .item b{color:var(--text);font-weight:600}

  .form-box{
    margin-top:0;background:transparent;border-radius:16px;padding:4px 0;
    min-height:380px;
  }
  .pipedriveWebForms{width:100%}

  .form-foot{margin-top:18px;font-size:12px;color:var(--text-3);text-align:center;line-height:1.6}

  /* ===== Mobile ===== */
  @media (max-width:980px){
    .shell{grid-template-columns:1fr}
    .form-col{position:static;height:auto;border-left:none;border-top:1px solid var(--line-soft)}
    .form-inner{padding:40px 22px 56px}
  }
</style>
</head>
<body>
<div class="shell">

  <!-- ============ LEFT : IMAGE ============ -->
  <div class="detail">
    <img src="detail.jpg" alt="AI 시대, 영상형 스킨으로 웹 에이전시의 차별점 만드는 법 - 웨비나 상세 안내">
  </div>

  <!-- ============ RIGHT : FORM ============ -->
  <aside class="form-col">
    <div class="form-inner">
      <div class="form-box">
        <!-- Pipedrive Web Form -->
        <div class="pipedriveWebForms" data-pd-webforms="https://webforms.pipedrive.com/f/1yM4JrtBqvOY3SzaZTsxF0lRHPrKjWzb9NcXReFmfwZy8ypcrCadLsK3CFBhZGmoH"><script src="https://webforms.pipedrive.com/f/loader"></script></div>
      </div>

      <div class="form-foot">신청 후 참석 링크가 이메일로 발송됩니다.</div>
    </div>
  </aside>

</div>
</body>
</html>
